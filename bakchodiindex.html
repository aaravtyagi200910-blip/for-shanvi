<!DOCTYPE html>
<html>
<head>
    <title>For My Friend 😎</title>
    <style>
        body {
            background: linear-gradient(to right, #d0f0ff, #f0f8ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "Comic Sans MS", cursive;
        }
        .box {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 0 25px lightblue;
            animation: pop 1s ease;
        }
        h1 { color: #0077cc; }
        h2 { color: #004080; }

        @keyframes pop {
            from {transform: scale(0.8); opacity: 0;}
            to {transform: scale(1); opacity: 1;}
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>OYE 😎</h1>
        <h2>Tu thoda sa pagal hai 🤡</h2>
        <h2>Par tu mera best dost bhi hai 😂🔥</h2>
        <p>Stay annoying forever 💙</p>
    </div>
</body>
</html>
