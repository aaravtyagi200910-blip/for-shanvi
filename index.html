<!DOCTYPE html>
<html>
<head>
    <title>For My Sister 💖</title>
    <style>
        body {
            background: linear-gradient(to right, #ffe6f0, #fff0f5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "Comic Sans MS", cursive;
        }
        .box {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 0 25px pink;
            animation: fadeIn 2s ease-in-out;
        }
        h1 {
            color: #ff3399;
        }
        h2 {
            color: #cc0066;
        }
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>HELLO! 💖</h1>
        <h2>YOU ARE MY CUTEST, BEST SISTER 🌹</h2>
        <p>Made with love 💕</p>
    </div>
</body>
</html>
